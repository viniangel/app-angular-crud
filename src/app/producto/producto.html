<div class="container py-5">

    <h1 class="text-center mb-4 retro-title">
        📦 Lista de Productos
    </h1>

    

    <div class="card text-light shadow-lg p-4 mx-auto retro-card mb-5"
         style="max-width: 800px;">

        <h2 class="text-center mb-4">
            🕹 Nuevo Producto
        </h2>

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text"
                       class="form-control form-control-sm"
                       [(ngModel)]="nombre">
            </div>

            <div class="col-md-6">
                <label class="form-label">Precio</label>
                <input type="number"
                       step="0.01"
                       class="form-control form-control-sm"
                       [(ngModel)]="precio">
            </div>

            <div class="col-md-6">
                <label class="form-label">Stock</label>
                <input type="number"
                       class="form-control form-control-sm"
                       [(ngModel)]="stock">
            </div>

            <div class="col-md-6">
                <label class="form-label">Imagen</label>
                <input type="text"
                       class="form-control form-control-sm"
                       [(ngModel)]="imagen">
            </div>

            <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control form-control-sm"
                          rows="3"
                          [(ngModel)]="descripcion"></textarea>
            </div>

        </div>

        <button class="btn btn-outline-light mt-4 w-100"
                (click)="guardar()">
            💾 Guardar
        </button>

    </div>

    <div class="table-responsive ">
        <table class="table table-dark table-hover align-middle text-center retro-table">
            <thead>
                <tr>
                    <th>NOMBRE</th>
                    <th>PRECIO</th>
                    <th>STOCK</th>
                    <th>IMAGEN</th>
                    <th>DESCRIPCIÓN</th>
                    <th colspan="2">ACCIONES</th>
                </tr>
            </thead>

            <tbody>
                @for(item of productos; track $index){
                <tr>
                    <td>{{item.nombre}}</td>
                    <td>${{item.precio}}</td>
                    <td>{{item.stock}}</td>
                    <td>
                        <img [src]="item.imagen" width="100" class="rounded retro-img">
                    </td>
                    <td>{{item.descripcion}}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning"
                                (click)="editar(item, $index)">
                            Editar
                        </button>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger"
                                (click)="eliminar($index)">
                            X
                        </button>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>

</div>
